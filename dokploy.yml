version: '3.8'

services:
  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - QR_SECRET=${QR_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
    volumes:
      - attendance_data:/app/data
    restart: unless-stopped

volumes:
  attendance_data:
